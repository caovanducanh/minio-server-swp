version: '3.8'

services:
  minio:
    image: quay.io/minio/minio:latest
    container_name: minio-server
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - minio-network

  mc:
    image: minio/mc
    container_name: minio-mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}) do echo '...waiting for minio...' && sleep 1; done;
      /usr/bin/mc mb myminio/products || true;
      /usr/bin/mc anonymous set public myminio/products;
      /usr/bin/mc anonymous set public myminio;
      exit 0;
      "
    networks:
      - minio-network

volumes:
  minio_data:

networks:
  minio-network:
    driver: bridge
